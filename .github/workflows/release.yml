name: Release

on:
  push:
    tags:
      - "v*.*.*"

env:
  QT_VERSION: "6.9.1"

jobs:
  # --- Windows (MinGW) build & package -------------------------------------
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get version from tag
        id: ver
        shell: bash
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Install Qt (MinGW)
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          host: windows
          target: desktop
          arch: win64_mingw
          cache: true

      - name: Locate .pro file
        id: proj
        shell: bash
        run: |
          PRO_FILE=$(find . -maxdepth 3 -name "*.pro" | head -n 1)
          echo "pro_file=$PRO_FILE" >> "$GITHUB_OUTPUT"
          echo "pro_dir=$(dirname "$PRO_FILE")" >> "$GITHUB_OUTPUT"

      - name: qmake (Release)
        shell: bash
        working-directory: ${{ steps.proj.outputs.pro_dir }}
        # Bakes the tag version into the binary; read it in code via
        # #ifdef APP_VERSION if you want to show it in an About dialog.
        run: qmake "$(basename "${{ steps.proj.outputs.pro_file }}")" CONFIG+=release "DEFINES+=APP_VERSION=\\\"${{ steps.ver.outputs.version }}\\\""

      - name: Build
        shell: bash
        working-directory: ${{ steps.proj.outputs.pro_dir }}
        run: mingw32-make -j$(nproc 2>/dev/null || echo 4) release

      - name: Locate built exe
        id: exe
        shell: bash
        working-directory: ${{ steps.proj.outputs.pro_dir }}
        run: |
          EXE=$(find . -iname "*.exe" -path "*release*" | head -n 1)
          if [ -z "$EXE" ]; then
            EXE=$(find . -iname "*.exe" | head -n 1)
          fi
          echo "exe_path=$EXE" >> "$GITHUB_OUTPUT"
          echo "exe_dir=$(dirname "$EXE")" >> "$GITHUB_OUTPUT"

      - name: windeployqt (bundle Qt DLLs)
        shell: bash
        working-directory: ${{ steps.proj.outputs.pro_dir }}
        run: windeployqt --release "${{ steps.exe.outputs.exe_path }}"

      - name: Package zip
        shell: bash
        working-directory: ${{ steps.proj.outputs.pro_dir }}
        run: |
          PKG="Quantum-${{ steps.ver.outputs.version }}-windows-x64"
          mkdir -p "$PKG"
          cp -r "${{ steps.exe.outputs.exe_dir }}"/* "$PKG"/
          7z a "${PKG}.zip" "$PKG"
          echo "zip_path=${{ steps.proj.outputs.pro_dir }}/${PKG}.zip" >> "$GITHUB_ENV"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-package
          path: ${{ env.zip_path }}

  # --- Linux build & AppImage package ---------------------------------------
  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get version from tag
        id: ver
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          host: linux
          target: desktop
          arch: gcc_64
          cache: true

      - name: Locate .pro file
        id: proj
        run: |
          PRO_FILE=$(find . -maxdepth 3 -name "*.pro" | head -n 1)
          echo "pro_file=$PRO_FILE" >> "$GITHUB_OUTPUT"
          echo "pro_dir=$(dirname "$PRO_FILE")" >> "$GITHUB_OUTPUT"

      - name: qmake (Release)
        working-directory: ${{ steps.proj.outputs.pro_dir }}
        run: qmake "$(basename "${{ steps.proj.outputs.pro_file }}")" CONFIG+=release "DEFINES+=APP_VERSION=\\\"${{ steps.ver.outputs.version }}\\\""

      - name: Build
        working-directory: ${{ steps.proj.outputs.pro_dir }}
        run: make -j$(nproc)

      - name: Locate built binary
        id: bin
        working-directory: ${{ steps.proj.outputs.pro_dir }}
        run: |
          BIN=$(find . -maxdepth 2 -type f -executable ! -name "*.so*" | grep -v "\.o$" | head -n 1)
          echo "bin_path=$BIN" >> "$GITHUB_OUTPUT"

      - name: Install linuxdeploy tools
        run: |
          wget -q https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          wget -q https://github.com/linuxdeploy/linuxdeploy-plugin-qt/releases/download/continuous/linuxdeploy-plugin-qt-x86_64.AppImage
          chmod +x linuxdeploy-x86_64.AppImage linuxdeploy-plugin-qt-x86_64.AppImage

      - name: Build AppImage
        working-directory: ${{ steps.proj.outputs.pro_dir }}
        env:
          QML_SOURCES_PATHS: ${{ github.workspace }}
        run: |
          mkdir -p AppDir/usr/bin
          cp "${{ steps.bin.outputs.bin_path }}" AppDir/usr/bin/Quantum
          ../linuxdeploy-x86_64.AppImage --appdir AppDir \
            -e AppDir/usr/bin/Quantum \
            --plugin qt \
            --output appimage \
            || true
          mv Quantum*.AppImage "Quantum-${{ steps.ver.outputs.version }}-linux-x86_64.AppImage" || true

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-package
          path: ${{ steps.proj.outputs.pro_dir }}/Quantum-*.AppImage

  # --- Publish release --------------------------------------------------
  publish-release:
    needs: [ build-windows, build-linux ]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Quantum ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            dist/windows-package/*.zip
            dist/linux-package/*.AppImage
